name: Build Windows

# Build an unsigned Windows installer and upload it as a workflow
# artifact. Useful for local testing before you have an EV code-signing
# certificate. Windows SmartScreen will show a "protect your PC" prompt
# because the build is unsigned — click "More info" → "Run anyway".

on:
  workflow_dispatch:
    inputs:
      build_portable:
        description: "Also build portable .exe (no install required)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - "claude/**"
    paths:
      - "apps/desktop/**"
      - "packages/shared-types/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    name: Build unsigned Windows installer
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Exclude workspace from Windows Defender
        # Defender on windows-latest sometimes quarantines 7za.exe
        # mid-install, surfacing later as `ENOENT ... chmod 7za.exe`.
        # Add an exclusion before anything touches node_modules.
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE" -ErrorAction Stop
            Write-Host "Defender exclusion added for $env:GITHUB_WORKSPACE"
          } catch {
            Write-Host "Could not add Defender exclusion (not fatal): $_"
          }

      - name: Install root dependencies
        # Using `npm install` rather than `npm ci` because the repo
        # doesn't yet have a committed package-lock.json.
        run: npm install --no-audit --no-fund --include=optional

      - name: Ensure 7zip-bin 7za.exe is present
        # electron-builder needs node_modules/7zip-bin/win/x64/7za.exe.
        # npm on Windows intermittently fails to land that file
        # (Defender quarantine or extraction race), surfacing later as
        # `ENOENT ... chmod 7za.exe` during packaging. Force-reinstall
        # unconditionally, and as a last resort download 7za.exe
        # directly from the upstream repo.
        shell: pwsh
        run: |
          $p = "node_modules/7zip-bin/win/x64/7za.exe"
          Write-Host "Initial check: Test-Path $p => $(Test-Path $p)"

          # Always force-reinstall to heal any quarantined/partial state.
          npm install 7zip-bin --no-save --force --no-audit --no-fund

          if (-not (Test-Path $p)) {
            Write-Host "Still missing after reinstall; downloading 7za.exe directly..."
            New-Item -ItemType Directory -Force -Path (Split-Path $p) | Out-Null
            $url = "https://github.com/develar/7zip-bin/raw/master/win/x64/7za.exe"
            Invoke-WebRequest -Uri $url -OutFile $p -UseBasicParsing
          }

          if (-not (Test-Path $p)) {
            Write-Error "7za.exe could not be placed at $p"
            Get-ChildItem node_modules/7zip-bin -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName
            exit 1
          }
          Write-Host "OK: $((Get-Item $p).Length) bytes at $p"

      - name: Ensure electron is resolvable from apps/desktop
        # With npm workspaces `electron` is typically hoisted to the
        # root node_modules. electron-builder's `computeElectronVersion`
        # sometimes fails to walk up in that layout. Installing it
        # directly into apps/desktop/node_modules guarantees discovery.
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -d "node_modules/electron" ]; then
            echo "electron not found in apps/desktop/node_modules, installing locally..."
            npm install --no-save --no-audit --no-fund --install-strategy=nested electron@30.5.1
          else
            echo "electron present: $(cat node_modules/electron/package.json | grep '\"version\"')"
          fi

      - name: Build shared-types
        run: npm run build -w packages/shared-types

      - name: Build renderer (Vite)
        working-directory: apps/desktop
        run: npm run build:renderer

      - name: Build Electron main/preload (tsc)
        working-directory: apps/desktop
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        # electron-builder.yml sets `npmRebuild: false` to avoid the
        # workspace-prune bug that deletes 7zip-bin. That means we
        # have to rebuild keytar (our only native dep) ourselves
        # against the Electron ABI.
        working-directory: apps/desktop
        shell: pwsh
        run: |
          npx --yes @electron/rebuild@3.6.0 -f -w keytar -v 30.5.1

      - name: Build Windows installer (electron-builder)
        working-directory: apps/desktop
        env:
          # No code-signing certificate — produce an unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish never

      - name: Show build output
        working-directory: apps/desktop
        shell: pwsh
        run: |
          Write-Host "== dist contents =="
          Get-ChildItem -Path dist -File -Recurse | Select-Object FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapLink-Windows-unsigned
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 14
